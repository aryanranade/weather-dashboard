# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/weatherdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Configuration
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# OpenWeatherMap API Configuration
openweather.api.key=${OPENWEATHER_API_KEY:}
openweather.api.url=${OPENWEATHER_API_URL:https://api.openweathermap.org/data/2.5}

# Server Configuration
server.port=8080

# Logging Configuration
logging.level.com.example.weatherapp=DEBUG
logging.level.org.springframework.security=DEBUG
